<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Grace Community Church{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top border-bottom bg-white">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#home">Grace Community</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <div class="navbar-nav ms-auto gap-lg-2">
            <a class="nav-link" href="#about">About</a>
            <a class="nav-link" href="#mass-programs">Mass Programs</a>
            <a class="nav-link" href="#projects">Church Projects</a>
            <a class="nav-link" href="#ministries">Ministries</a>
            <a class="nav-link" href="#visit">Plan a Visit</a>
          </div>
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="bg-dark text-light py-4 mt-5">
      <div class="container d-flex flex-wrap justify-content-between gap-2">
        <div>
          <h3 class="h5">Grace Community Church</h3>
          <p class="mb-1">123 Hope Street, Springfield, ST 12345</p>
          <p class="mb-0">(555) 123-4567 · hello@gracecommunity.org</p>
        </div>
        <p class="mb-0 align-self-end">© {{ current_year }} Grace Community Church. All rights reserved.</p>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
